name: "Test gateway experiment"

on:
  workflow_dispatch:
    inputs:
      github_environment:
        description: GitHub Environment to use for this test run
        required: true
        type: choice
        options:
          - test-gateway
          - test-gateway-no-reviewers
        default: test-gateway
      target:
        description: mock target
        required: true
        type: chose
        options:
          - pipeline-1
          - pipeline-2
          - pipeline-3

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.github_environment }}
      deployment: ${{ inputs.github_environment == 'test-gateway' }}
    name: "Deploy (${{ inputs.github_environment }}, ${{ inputs.target }})"
    steps:
      - uses: actions/checkout@v4
      - name: Prove run context
        run: |
          echo "Environment: ${{ inputs.github_environment }} (from workflow job configuration)"
          echo "Run ID: ${GITHUB_RUN_ID}"
          echo "Ref: ${GITHUB_REF}"
